<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Världens bästa hemsida</title>

    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>

    <div class="dashboard">

        <header class="topbar">
            <div class="logo">
                <h1>🐾 Bästa kartan</h1>
            </div>

            <div class="topbar-controls">
                <div id="weatherWidget" class="weather-widget">
                    Hämtar lokalt väder... 🌤️
                </div>
                <button id="themeToggle" class="theme-btn">🌙 Byt tema</button>
            </div>
        </header>

        <main class="main-layout">

            <aside class="sidebar">
                <h3>Filtrera observationer</h3>

                <div class="filter-group">
                    <label class="filter-title">Välj arter (flera möjliga):</label>
                    <div class="checkbox-group">
                        <label class="custom-checkbox">
                            <input type="checkbox" id="markeraAlla">
                            <span>🌟 Markera alla</span>
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" value="1" checked>
                            <span>🐺 Varg</span>
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" value="2" checked>
                            <span>🐺 Varg</span>
                        </label>
                        <label class="custom-checkbox">
                            <input type="checkbox" value="3" checked>
                            <span>🐱 Lodjur</span>
                        </label>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-title">Tidsintervall:</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="timeStep" value="halv" checked> Halvårsvis
                        </label>
                        <label>
                            <input type="radio" name="timeStep" value="hel"> Helår
                        </label>
                    </div>
                </div>

                <hr>

            </aside>

            <section class="map-section">
                <div id="map" class="map-container"></div>

                <div class="timeline-container">
                    <div class="timeline-header">
                        <span id="currentTimelineDate">Visar tidsperiod: <strong id="periodText">2016 H1 till 2026 H1</strong></span>
                    </div>

                    <div class="range-slider-wrapper">
                        <input type="range" id="timeSliderMin" min="0" max="20" value="0" step="1">
                        <input type="range" id="timeSliderMax" min="0" max="20" value="20" step="1">
                    </div>

                    <div class="timeline-labels">
                        <span>2016</span>
                        <span>2021</span>
                        <span>2026</span>
                    </div>
                </div>

                <div class="chart-container">
                    <canvas id="trendsChart"></canvas>
                </div>
            </section>

        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type=module src="js/app.js"></script>
</body>
</body>

</html>
